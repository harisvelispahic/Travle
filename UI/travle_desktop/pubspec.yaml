name: travle_desktop
description: "Travle — organizer & administrator management console."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  file_picker: ^11.0.1

  # Shared local packages (monorepo path deps — compiled into this app only).
  travle_core:
    path: ../travle_core
  travle_ui:
    path: ../travle_ui

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App launcher icon. Replace assets/icon/app_icon.png with the final artwork,
# then regenerate: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
