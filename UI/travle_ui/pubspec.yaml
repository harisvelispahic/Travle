name: travle_ui
description: Shared design system for the Travle apps — tokens, theme, and widgets.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Shared client logic (pure Dart utils/models). The design system consumes
  # core helpers (e.g. ImageCodec) so all non-widget logic has a single home.
  travle_core:
    path: ../travle_core

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
