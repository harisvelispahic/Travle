# Travle — orchestration. Run from the repo root.
#
#   docker compose up --build
#       → everything: SQL Server, RabbitMQ, worker, API (the canonical / grader run).
#
#   docker compose up travle-sqlserver travle-rabbitmq travle-worker
#       → infra + worker only; leave the API out and run/debug it locally in VS.
#         (A locally-run API reads appsettings.Development.json → localhost,1435 / localhost:5672.)
#
# All values come from `.env` (copy `.env.example` → `.env`). Nothing secret is hardcoded here.

services:
  travle-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: travle-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "${SQLSERVER_HOST_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - travle-network

  travle-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: travle-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_HOST_PORT}:5672"     # AMQP
      - "${RABBITMQ_MGMT_PORT}:15672"    # management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travle-network

  travle-worker:
    build:
      context: ./Backend
      dockerfile: Travle.Worker/Dockerfile
    container_name: travle-worker
    environment:
      - DOTNET_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - RabbitMq__Host=${RABBITMQ_HOST}
      - RabbitMq__Port=${RABBITMQ_PORT}
      - RabbitMq__Username=${RABBITMQ_USERNAME}
      - RabbitMq__Password=${RABBITMQ_PASSWORD}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__From=${SMTP_FROM:-no-reply@travle.com}
      - Smtp__FromName=${SMTP_FROM_NAME:-Travle}
      - Smtp__UseStartTls=${SMTP_USE_STARTTLS:-true}
    depends_on:
      - travle-sqlserver
      - travle-rabbitmq
    networks:
      - travle-network

  travle-api:
    build:
      context: ./Backend
      dockerfile: Travle.WebAPI/Dockerfile
    container_name: travle-api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - JwtToken__SecretKey=${JWT_SECRET_KEY}
      - JwtToken__Issuer=${JWT_ISSUER}
      - JwtToken__Audience=${JWT_AUDIENCE}
      - JwtToken__DurationInMinutes=${JWT_DURATION_MINUTES}
      - JwtToken__RefreshTokenDays=${JWT_REFRESH_TOKEN_DAYS:-7}
      - RabbitMq__Host=${RABBITMQ_HOST}
      - RabbitMq__Port=${RABBITMQ_PORT}
      - RabbitMq__Username=${RABBITMQ_USERNAME}
      - RabbitMq__Password=${RABBITMQ_PASSWORD}
    ports:
      - "${API_HOST_PORT}:5121"
    depends_on:
      - travle-sqlserver
      - travle-rabbitmq
    networks:
      - travle-network

volumes:
  sqlserver_data:
  rabbitmq_data:

networks:
  travle-network:
    driver: bridge
